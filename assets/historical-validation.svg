<svg viewBox="0 0 1200 640" xmlns="http://www.w3.org/2000/svg">
<defs>
<style>
  .bg{fill:#1B1D22;}
  .card{fill:#22242A;stroke:#33353C;stroke-width:1;}
  .eyebrow{font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:2px;fill:#2F5FD6;}
  .headline{font-family:Georgia,'Fraunces',serif;font-size:34px;fill:#FFFFFF;font-weight:500;}
  .sub{font-family:Arial,'Inter',sans-serif;font-size:15px;fill:#9A9DA6;}
  .name{font-family:Arial,'Inter',sans-serif;font-size:16px;font-weight:700;fill:#FFFFFF;}
  .num{font-family:Georgia,'Fraunces',serif;font-size:36px;fill:#5B82E0;font-weight:500;}
  .lbl{font-family:Arial,'Inter',sans-serif;font-size:11px;fill:#8A8D96;}
  .score{font-family:Arial,'Inter',sans-serif;font-size:13px;font-weight:700;fill:#D9A94A;}
</style>
</defs>

<rect class="bg" width="1200" height="640"/>

<text x="60" y="56" class="eyebrow">HISTORICAL VALIDATION</text>
<text x="60" y="102" class="headline">6 cases. 8.3 year average lead time.</text>
<text x="60" y="136" class="sub">Signal Intelligence has been validated against six historical cases where the earliest</text>
<text x="60" y="158" class="sub">detectable signals preceded mainstream recognition by years — not months.</text>

<!-- Row 1 -->
<rect class="card" x="60" y="200" width="352" height="150" rx="6"/>
<text x="88" y="240" class="name">SpaceX</text>
<text x="88" y="284" class="num">9.4y</text>
<text x="88" y="306" class="lbl">lead time before mainstream</text>
<text x="88" y="332" class="score">Peak opp score: 0.87</text>

<rect class="card" x="424" y="200" width="352" height="150" rx="6"/>
<text x="452" y="240" class="name">NVIDIA</text>
<text x="452" y="284" class="num">7.2y</text>
<text x="452" y="306" class="lbl">lead time before mainstream</text>
<text x="452" y="332" class="score">Peak opp score: 0.91</text>

<rect class="card" x="788" y="200" width="352" height="150" rx="6"/>
<text x="816" y="240" class="name">Bitcoin</text>
<text x="816" y="284" class="num">11.3y</text>
<text x="816" y="306" class="lbl">lead time before mainstream</text>
<text x="816" y="332" class="score">Peak opp score: 0.85</text>

<!-- Row 2 -->
<rect class="card" x="60" y="370" width="352" height="150" rx="6"/>
<text x="88" y="410" class="name">OpenAI</text>
<text x="88" y="454" class="num">6.8y</text>
<text x="88" y="476" class="lbl">lead time before mainstream</text>
<text x="88" y="502" class="score">Peak opp score: 0.89</text>

<rect class="card" x="424" y="370" width="352" height="150" rx="6"/>
<text x="452" y="410" class="name">Shopify</text>
<text x="452" y="454" class="num">8.1y</text>
<text x="452" y="476" class="lbl">lead time before mainstream</text>
<text x="452" y="502" class="score">Peak opp score: 0.82</text>

<rect class="card" x="788" y="370" width="352" height="150" rx="6"/>
<text x="816" y="410" class="name">Tesla</text>
<text x="816" y="454" class="num">9.7y</text>
<text x="816" y="476" class="lbl">lead time before mainstream</text>
<text x="816" y="502" class="score">Peak opp score: 0.88</text>

<!-- CTA style strip -->
<rect x="60" y="550" width="1080" height="60" rx="6" fill="#2A2418" stroke="#D9A94A" stroke-width="1"/>
<text x="88" y="577" font-family="Arial,'Inter',sans-serif" font-size="14" font-weight="700" fill="#D9A94A">See the signal before the crowd</text>
<text x="88" y="597" font-family="Arial,'Inter',sans-serif" font-size="12" fill="#B7A576">Full validation methodology available on request</text>
</svg>
